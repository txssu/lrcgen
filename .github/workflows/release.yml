name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: lrcgen-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: lrcgen-linux-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: lrcgen-darwin-x64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: lrcgen-darwin-arm64
          - os: windows-latest
            target: bun-windows-x64
            artifact: lrcgen-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun test
        if: matrix.target == 'bun-linux-x64'

      - run: bun build ./src/index.ts --compile --target=${{ matrix.target }} --outfile ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - run: |
          chmod +x artifacts/lrcgen-linux-x64
          chmod +x artifacts/lrcgen-linux-arm64
          chmod +x artifacts/lrcgen-darwin-x64
          chmod +x artifacts/lrcgen-darwin-arm64

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/lrcgen-linux-x64
            artifacts/lrcgen-linux-arm64
            artifacts/lrcgen-darwin-x64
            artifacts/lrcgen-darwin-arm64
            artifacts/lrcgen-windows-x64.exe
